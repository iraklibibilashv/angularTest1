<main>
    <div class="btnContainer">
        @for (item of buttons; track $index) {
            <button  (click)="filterOnclick(item.id)">
                {{item.name}}</button>
        }
        <button>By Price</button>
        <button>By Spice</button>
    </div>
    <div class="menuGrid">
  @for (el of filterProducts; track $index) {
<div class="card" (click)="onClick(el)">
  <div class="card-img">
    <img [src]="el.image" alt="">
  </div>

  <div class="card-body">
    <h3 class="card-title">{{el.name}}</h3>
    <p class="card-price">$ {{el.price}}</p>

    <div class="card-info">
      <span class="spicy">Spice {{el.spiciness}}</span>
      <span class="nuts"> Nuts {{el.nuts}}</span>
      <span class="veg"> Veg {{el.vegeterian}}</span>
    </div>
  </div>
</div>

}
</div>
</main>
