<main>
    <div class="btnContainer">

      <div class="sortIdContainer">
      <button (click)="filterOnclick()">All</button>
        @for (item of buttons; track $index) {
            <button  (click)="filterOnclick(item.id)">
                {{item.name}}</button>
        }
        </div>
        <div class="sortByContainer">
        <button (click)="byPriceAsc()">By Price ↓</button>
        <button (click)="byPriceDesc()">By Price ↑</button>
        <button (click)="bySpiceAsc()">By Spice ↓</button>
        <button (click)="bySpiceDesc()">By Spice ↑</button>
        </div>
    </div>
    <div class="menuGrid">
  @for (el of filterProducts; track $index) {
<div class="card" (click)="onClick(el)">
  <div class="card-img">
    <img [src]="el.image" alt="">
  </div>

  <div class="card-body">
    <h3 class="card-title">{{el.name}}</h3>
    <p class="card-price">$ {{el.price}}</p>

    <div class="card-info">
      <span class="spicy">Spice {{el.spiciness}}</span>
      <span class="nuts"> Nuts {{el.nuts}}</span>
      <span class="veg"> Veg {{el.vegeterian}}</span>
    </div>
  </div>
</div>

}
</div>
</main>
